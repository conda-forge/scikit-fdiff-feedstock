{% set name = "scikit-fdiff" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scikit-fdiff-{{ version }}.tar.gz
  sha256: 05d39e607c553cbc3b3ec328b84a6f2665291cd095ef94ae8479819ad4fbe3ec

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - numba
    - scipy
    - sympy
    - path
    - streamz
    - more-itertools
    - xarray
    - dask-core
    - pyyaml
    - tqdm
    - cloudpickle
    - attrs
    - matplotlib-base
    - holoviews
    - boltons
    - appdirs
    - python-forge
    - fuzzywuzzy
    - cachetools
    - cached-property
    - loguru

test:
  requires:
    - python {{ python_min }}
  imports:
    - skfdiff
  

about:
  home: https://gitlab.com/celliern/scikit-fdiff/
  summary: Automatic finite difference discretization for 1D PDE with fast temporal solvers.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thealanjason
